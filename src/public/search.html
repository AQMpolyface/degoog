<div id="app">
  <div id="results-page">
    <div id="results-header"></div>
    <div id="results-tabs"></div>
    <div id="results-meta"></div>
    <div id="results-layout">
      <div id="results-main">
        <div id="at-a-glance"></div>
        <div id="slot-above-results" data-position="above-results"></div>
        <div id="results-list"></div>
        <div id="pagination"></div>
        <div id="slot-below-results" data-position="below-results"></div>
      </div>
      <div id="sidebar-col">
        <div id="slot-above-sidebar" data-position="above-sidebar"></div>
        <div id="results-sidebar"></div>
        <div id="slot-below-sidebar" data-position="below-sidebar"></div>
      </div>
      <div id="media-preview-panel"></div>
    </div>
  </div>
</div>
<div id="img-lightbox"></div>

<template id="degoog-search-media-preview">
  <button class="media-preview-close" id="media-preview-close">
    &times;
  </button>
  <div class="media-preview-img-wrap">
    <button
      class="media-preview-nav media-preview-prev"
      id="media-preview-prev"
    >
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <img
      class="media-preview-img"
      id="media-preview-img"
      src=""
      alt=""
    />
    <button
      class="media-preview-nav media-preview-next"
      id="media-preview-next"
    >
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="9 6 15 12 9 18" />
      </svg>
    </button>
  </div>
  <div class="media-preview-info" id="media-preview-info"></div>
</template>

<template id="degoog-search-lightbox">
  <div class="img-lightbox-bg" id="img-lightbox-bg"></div>
  <button class="img-lightbox-close" id="img-lightbox-close">
    &times;
  </button>
  <div class="img-lightbox-wrap" id="img-lightbox-wrap">
    <img class="img-lightbox-img" id="img-lightbox-img" src="" alt="" />
  </div>
</template>

<template id="degoog-search-header">
  <a href="/" class="results-logo">
    <span class="logo-d">d</span><span class="logo-e">e</span
    ><span class="logo-g1">g</span><span class="logo-o1">o</span
    ><span class="logo-o2">o</span><span class="logo-g2">g</span>
  </a>
  <div class="results-search-bar" id="results-search-bar">
    <svg
      class="search-icon"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#9aa0a6"
      stroke-width="2"
    >
      <circle cx="11" cy="11" r="8" />
      <path d="M21 21l-4.35-4.35" />
    </svg>
    <input
      type="text"
      class="search-input"
      id="results-search-input"
      autocomplete="off"
    />
    <div class="ac-dropdown" id="ac-dropdown-results"></div>
    <div
      id="search-bar-actions-results"
      class="search-bar-actions"
    ></div>
    <button class="search-submit-btn" id="results-search-btn">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="#4285f4"
        stroke="none"
      >
        <circle
          cx="11"
          cy="11"
          r="8"
          fill="none"
          stroke="#4285f4"
          stroke-width="2"
        />
        <path d="M21 21l-4.35-4.35" stroke="#4285f4" stroke-width="2" />
      </svg>
    </button>
  </div>
  <a
    href="/settings"
    class="header-link settings-gear"
    id="nav-settings-results"
    title="Settings"
  >
    <svg
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"
      />
      <circle cx="12" cy="12" r="3" />
    </svg>
  </a>
</template>

<template id="degoog-search-tabs">
  <div class="results-tab active" data-type="web">Web</div>
  <div class="results-tab" data-type="images">Images</div>
  <div class="results-tab" data-type="videos">Videos</div>
  <div class="results-tab" data-type="news">News</div>
  <div class="tools-wrap" id="tools-bar">
    <button class="tools-toggle" id="tools-toggle" type="button">
      Options
    </button>
    <div class="tools-dropdown" id="tools-dropdown" style="display: none">
      <button class="tools-menu-item" data-menu="time" type="button">
        <span class="tools-menu-label">Time</span>
        <span class="tools-menu-value" id="tools-time-val">Any time</span>
        <svg
          class="tools-menu-chevron"
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
      <button class="tools-menu-item" data-menu="lang" type="button">
        <span class="tools-menu-label">Language</span>
        <span class="tools-menu-value" id="tools-lang-val">Any</span>
        <svg
          class="tools-menu-chevron"
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>
    <div
      class="tools-submenu"
      id="tools-submenu-time"
      style="display: none"
    >
      <button class="tools-option active" data-time="any">Any time</button>
      <button class="tools-option" data-time="hour">Hour</button>
      <button class="tools-option" data-time="day">24 hours</button>
      <button class="tools-option" data-time="week">Week</button>
      <button class="tools-option" data-time="month">Month</button>
      <button class="tools-option" data-time="year">Year</button>
      <button class="tools-option" data-time="custom">Custom...</button>
      <div
        class="tools-custom-date"
        id="tools-custom-date"
        style="display: none"
      >
        <input type="date" id="tools-date-from" class="tools-date-input" />
        <span class="tools-date-sep">to</span>
        <input type="date" id="tools-date-to" class="tools-date-input" />
        <button
          type="button"
          class="tools-date-apply"
          id="tools-date-apply"
        >
          Apply
        </button>
      </div>
    </div>
    <div
      class="tools-submenu"
      id="tools-submenu-lang"
      style="display: none"
    >
      <input
        type="text"
        class="tools-lang-filter"
        id="tools-lang-filter"
        placeholder="Filter languages..."
        autocomplete="off"
      />
      <div class="tools-lang-list" id="tools-lang-list"></div>
    </div>
  </div>
</template>

<template id="degoog-result">
  <div class="result-item">
    <div class="result-item-inner">
      {{#if thumbnail_url}}
      <div class="result-thumbnail-wrap">
        <img
          class="result-thumbnail-img"
          src="{{ thumbnail_url }}"
          alt=""
          loading="lazy"
          onerror="this.parentElement.style.display='none'"
        />
      </div>
      {{/if thumbnail_url}}
      <div class="result-body">
        <div class="result-url-row">
          <img
            class="result-favicon"
            src="{{ favicon_url }}"
            alt=""
            width="26"
            height="26"
            onerror="this.style.display='none'"
          />
          <cite class="result-cite">{{ cite_url }}</cite>
        </div>
        <a
          class="result-title"
          href="{{ url }}"
          target="{{ link_target }}"
          rel="{{ link_rel }}"
          >{{ title }}</a
        >
        <p class="result-snippet">{{ snippet }}</p>
        <div class="result-engines">
          {{#each sources}}<span class="result-engine-tag">{{ . }}</span>{{/each sources}}
        </div>
      </div>
    </div>
  </div>
</template>

<template id="degoog-image-card">
  <div class="image-thumb-wrap">
    <img
      class="image-thumb"
      src="{{ thumbnail_url }}"
      alt="{{ title }}"
      loading="lazy"
      onerror="this.parentElement.parentElement.style.display='none'"
    />
  </div>
  <div class="image-info">
    <span class="image-title">{{ title }}</span>
    <span class="image-source">{{ hostname }}</span>
  </div>
</template>

<template id="degoog-video-card">
  <div class="video-thumb-wrap">
    <img
      class="video-thumb"
      src="{{ thumbnail_url }}"
      alt="{{ title }}"
      loading="lazy"
      onerror="this.style.display='none';this.parentElement.querySelector('.video-play-icon').style.opacity='1'"
    />
    {{#if duration}}<span class="video-duration">{{ duration }}</span>{{/if duration}}
    <div class="video-play-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="white">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
    </div>
  </div>
  <div class="video-info">
    <span class="video-title">{{ title }}</span>
    <span class="video-source">{{ hostname }}</span>
  </div>
</template>

<template id="degoog-at-a-glance">
  <div class="glance-box">
    <div class="glance-snippet">{{ snippet }}</div>
    <a class="glance-link" href="{{ url }}" target="_blank">{{ title }}</a>
    <div class="glance-sources">Found on: {{ sources_text }}</div>
  </div>
</template>
